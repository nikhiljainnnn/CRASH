version: '3.8'

services:
  # Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: crash-detection-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - crash-detection-network

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: crash-detection-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - crash-detection-network

  # PostgreSQL for event storage
  postgres:
    image: postgres:15-alpine
    container_name: crash-detection-postgres
    environment:
      POSTGRES_DB: crash_detection
      POSTGRES_USER: crash_user
      POSTGRES_PASSWORD: crash_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deployment/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - crash-detection-network

  # Edge Detection Service
  detection-service:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.edge
    container_name: crash-detection-edge
    runtime: nvidia
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
    depends_on:
      - kafka
      - redis
    networks:
      - crash-detection-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Cloud Prediction Service
  cloud-predictor:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.cloud
    container_name: crash-detection-cloud
    runtime: nvidia
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=crash_detection
      - POSTGRES_USER=crash_user
      - POSTGRES_PASSWORD=crash_password
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
    depends_on:
      - kafka
      - redis
      - postgres
    networks:
      - crash-detection-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Alert Service
  alert-service:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.alert
    container_name: crash-detection-alert
    environment:
      - KAFKA_BROKER=kafka:29092
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=crash_detection
      - POSTGRES_USER=crash_user
      - POSTGRES_PASSWORD=crash_password
      - EMERGENCY_API_KEY=${EMERGENCY_API_KEY}
    depends_on:
      - kafka
      - postgres
    networks:
      - crash-detection-network

  # API Server
  api-server:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    container_name: crash-detection-api
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER=kafka:29092
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=crash_detection
      - POSTGRES_USER=crash_user
      - POSTGRES_PASSWORD=crash_password
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
    depends_on:
      - kafka
      - redis
      - postgres
    networks:
      - crash-detection-network

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: crash-detection-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - crash-detection-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: crash-detection-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - crash-detection-network

  # Dashboard Frontend
  dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: crash-detection-dashboard
    ports:
      - "3001:80"
    depends_on:
      - api-server
    networks:
      - crash-detection-network

volumes:
  kafka-data:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  crash-detection-network:
    driver: bridge
