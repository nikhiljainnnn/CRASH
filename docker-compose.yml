# CRASH Edge Deployment
# Orchestrates the AI inference engine, Prometheus monitoring, and Grafana dashboard.


services:
  # 1. AI Inference Engine (PyTorch / TensorRT)
  crash_inference:
    build: 
      context: .
      dockerfile: deployment/Dockerfile
    container_name: crash_core
    restart: unless-stopped
    ports:
      - "8000:8000" # FastAPI Inference API
      - "8001:8001" # Prometheus Metrics Pipeline
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_PATH=/app/checkpoints/fusion/model.onnx
      - BATCH_SIZE=4
      - USE_TENSORRT=1
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 2. Prometheus — Time-series DB for monitoring ML latency & drift
  prometheus:
    image: prom/prometheus:latest
    container_name: crash_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

  # 3. Grafana — Dashboard for visualizing Crash risks & system health
  grafana:
    image: grafana/grafana:latest
    container_name: crash_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=crashadmin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prom_data:
  grafana_data:
